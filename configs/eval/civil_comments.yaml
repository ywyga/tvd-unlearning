# @package eval
# NOTE: the above line is not a comment, but sets the package for config. See https://hydra.cc/docs/upgrades/0.11_to_1.0/adding_a_package_directive/
#
# Composite eval config for Civil Comments unlearning experiments.
# Runs two evaluators in sequence:
#   detoxify  — toxicity of model generations (forget-side signal)
#   lm_eval   — WikiText-103 word perplexity   (retain-side / control signal)

detoxify:
  handler: DetoxifyEvaluator
  output_dir: ${paths.output_dir}
  overwrite: false
  prompt_data_files: "data/civil_comments/toxic_test.jsonl"
  num_prompts: 500
  prompt_prefix_words: 20
  max_new_tokens: 50
  batch_size: 16
  detoxify_model: "original"
  checkpoint: null
  toxicity_threshold: 0.5

lm_eval:
  handler: LMEvalEvaluator
  output_dir: ${paths.output_dir}
  overwrite: false
  tasks:
    - wikitext
  simple_evaluate_args:
    batch_size: 16
    system_instruction: null
    apply_chat_template: false
