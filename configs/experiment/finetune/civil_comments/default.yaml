# @package _global_
#
# Fine-tune experiment config for Civil Comments. Used to create two prerequisite checkpoints:
#   - M1 (all train comments):  --config-name=train.yaml with CIVIL_COMMENTS_full dataset
#   - M_forget (toxic only):    --config-name=train.yaml with CIVIL_COMMENTS_forget dataset
#
# Override the dataset at invocation time:
#   data/datasets@data.train=CIVIL_COMMENTS_forget   → toxic-only corpus
#   (default)                                         → full train corpus (CIVIL_COMMENTS_full)

defaults:
  - override /model: phi-1_5
  - override /trainer: finetune
  - override /data/datasets@data.train: CIVIL_COMMENTS_full
  - override /data: finetune
  - override /eval: null

mode: finetune

trainer:
  args:
    learning_rate: 2e-5
    num_train_epochs: 1
    per_device_train_batch_size: 4
    gradient_accumulation_steps: 8
    gradient_checkpointing: true
    eval_strategy: 'no'
    do_eval: false
    eval_on_start: false

task_name: ???
